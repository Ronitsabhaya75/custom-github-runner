name: ephemera-ci-pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # =========================================================================
  # JOB 1: Dynamic Multi-OS Unit & Smoke Testing (Linux, macOS, Windows)
  # =========================================================================
  multi-os-testing:
    name: Test on ${{ matrix.os-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-name: Linux
          - os: macos-latest
            os-name: macOS
          - os: windows-latest
            os-name: Windows

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Go Development Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true

      - name: Download Go Module Dependencies
        run: go mod download

      # 1. Automated Unit Tests
      - name: Run Package Unit Tests
        run: go test -v ./...

      # 2. Smoke Test: Verify Compilation & Configuration Loading
      - name: Execute Build Smoke Test
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            go build -o runner.exe ./cmd/runner
          else
            go build -o runner ./cmd/runner
          fi

      - name: Verify Dry-Run Output (Smoke Verification)
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ./runner.exe
          else
            ./runner
          fi

  # =========================================================================
  # JOB 2: Live Kubernetes Integration & Capability Compliance ("Captain")
  # =========================================================================
  live-k8s-integration:
    name: Live K8s Integration & Compliance (Linux)
    runs-on: ubuntu-latest
    needs: [multi-os-testing]

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Go Development Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true

      - name: Download Go Module Dependencies
        run: go mod download

      # Setup KinD (Kubernetes in Docker) Cluster automatically in the CI pipeline
      - name: Bootstrap local KinD Cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: kind-ci-cluster

      # Verify Cluster is online and client-go can reach it
      - name: Verify Kubernetes API Health
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide

      # 3. 'Captain' & End-to-End Integration Testing
      # This runs both TestLiveOrchestratorIntegration and TestComplianceCapabilityDrops
      - name: Run Live Integration & Capability Compliance ("Captain") Tests
        run: |
          go test -tags=integration -v ./pkg/orchestrator/...
