name: ephemera-ci-pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # =========================================================================
  # Unified Multi-OS Unit, Smoke, & Integration Testing (Linux, macOS, Windows)
  # =========================================================================
  multi-os-testing:
    name: Test on ${{ matrix.os-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-name: Linux
          - os: macos-latest
            os-name: macOS
          - os: windows-latest
            os-name: Windows

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Go Development Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true

      - name: Download Go Module Dependencies
        run: go mod download

      # 1. Bootstrap local KinD Cluster (Linux Only)
      - name: Bootstrap local KinD Cluster
        if: matrix.os == 'ubuntu-latest'
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: kind-ci-cluster

      # 2. Verify Kubernetes API Health (Linux Only)
      - name: Verify Kubernetes API Health
        if: matrix.os == 'ubuntu-latest'
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide

      # 3. Run Package Unit & Live Integration Tests (All OS)
      # This runs both standard tests and -tags=integration tests across all platforms
      - name: Run Package Unit & Integration Tests
        run: go test -tags=integration -v ./...

      # 4. Smoke Test: Verify Compilation & Configuration Loading (All OS)
      - name: Execute Build Smoke Test
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            go build -o runner.exe ./cmd/runner
          else
            go build -o runner ./cmd/runner
          fi

      # 5. Verify Dry-Run Output (Smoke Verification) (All OS)
      - name: Verify Dry-Run Output (Smoke Verification)
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ./runner.exe
          else
            ./runner
          fi
