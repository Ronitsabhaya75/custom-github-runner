name: ephemera-ci-pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # =========================================================================
  # 1. CodeQL Security Scanning
  # =========================================================================
  codeql:
    name: Code Scanning - Action / CodeQL-Build (push)
    runs-on: self-hosted
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'go'

      - name: Build Application for CodeQL Analysis
        run: |
          go build -o runner cmd/runner/main.go

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # =========================================================================
  # 2. Multi-OS / Multi-Architecture Compilation Matrix
  # =========================================================================
  build:
    name: Runner CI / build (${{ matrix.os-name }}-${{ matrix.arch }}) (push)
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - os: ubuntu-latest
            os-name: linux
            arch: arm
            goarch: arm
            goos: linux
          - os: ubuntu-latest
            os-name: linux
            arch: arm64
            goarch: arm64
            goos: linux
          - os: ubuntu-latest
            os-name: linux
            arch: x64
            goarch: amd64
            goos: linux

          # macOS builds
          - os: macos-latest
            os-name: osx
            arch: arm64
            goarch: arm64
            goos: darwin
          - os: macos-latest
            os-name: osx
            arch: x64
            goarch: amd64
            goos: darwin

          # Windows builds
          - os: windows-latest
            os-name: win
            arch: arm64
            goarch: arm64
            goos: windows
          - os: windows-latest
            os-name: win
            arch: x64
            goarch: amd64
            goos: windows

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go Development Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Download Module Dependencies
        run: go mod download

      - name: Execute Package Unit & Integration Tests
        # Run standard and integration tests
        run: go test -tags=integration -v ./...

      - name: Compile Lightweight Runner Binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -v -o runner-${{ matrix.os-name }}-${{ matrix.arch }}.exe cmd/runner/main.go
          else
            go build -v -o runner-${{ matrix.os-name }}-${{ matrix.arch }} cmd/runner/main.go
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runner-${{ matrix.os-name }}-${{ matrix.arch }}
          path: runner-${{ matrix.os-name }}-${{ matrix.arch }}*

  # =========================================================================
  # 3. Docker Platform Containers Build
  # =========================================================================
  docker:
    name: Runner CI / docker (${{ matrix.image-name }}) (push)
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - image-name: ubuntu-24.04-arm
            platform: linux/arm64
          - image-name: ubuntu-latest
            platform: linux/amd64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch builds
        if: matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Runner Container Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          tags: custom-k8s-runner:${{ matrix.image-name }}

  # =========================================================================
  # 4. Dynamic Check & Package Registration
  # =========================================================================
  dynamic:
    name: dynamic / submit-nuget (dynamic)
    needs: [build, docker]
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Output
        uses: actions/download-artifact@v4
        with:
          path: bin/

      - name: Simulate NuGet Registration
        run: |
          echo "Simulating nuget publication of modules..."
          ls -la bin/
          echo "Packages submitted successfully!"
